{{define "note"}}<div class="note" id="note-{{.ID}}">
	<h3>{{.Title}}</h3>
	{{if .Body}}<p>{{.Body}}</p>{{end}}
	<div class="meta">
		<time>{{if not .CreatedAt.IsZero}}{{.CreatedAt.Format "02.01.2006 15:04"}}{{end}}</time>
		<button class="del"
			hx-delete="/notes/{{.ID}}"
			hx-target="#note-{{.ID}}"
			hx-swap="outerHTML"
			hx-confirm="Удалить заметку?">Удалить</button>
	</div>
</div>{{end}}
