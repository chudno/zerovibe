#cloud-config
# Инициализация чистой VM Ubuntu 22.04 под хостинг zerovibe:
#   - ставит Docker Engine + compose-плагин из официального репозитория Docker;
#   - готовит каталог /opt/zerovibe под код приложения и compose-стек.
# Сам код и `docker compose up` доставляет скрипт deploy/vm/deploy.sh по SSH
# (Фаза 2). На Фазе 3 эту доставку возьмёт на себя оркестратор.

package_update: true
package_upgrade: false

write_files:
  - path: /opt/zerovibe/.keep
    content: "zerovibe app dir\n"
    owner: root:root
    permissions: "0644"

runcmd:
  # Установка Docker по официальному скрипту (идемпотентно, быстро для MVP).
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  # compose-плагин ставится вместе с docker-ce, проверим наличие.
  - docker compose version || (apt-get update && apt-get install -y docker-compose-plugin)
  - mkdir -p /opt/zerovibe/app
