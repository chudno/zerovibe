# Стек на одной VM: Caddy (реверс-прокси + авто-TLS) + приложение zerovibe.
# Caddy сам получает и продлевает Let's Encrypt сертификат для домена из
# Caddyfile — ручной возни с TLS нет. zerovibe слушает внутри сети, наружу
# торчит только Caddy (80/443).
#
# На Фазе 2 образ zerovibe собирается прямо на VM из исходников (build: ../..),
# которые cloud-init положил в /opt/zerovibe. На Фазе 3 оркестратор заменит это
# на pull готового образа из реестра.

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ADDR: ":8080"
      DB_PATH: "file:/data/zerovibe.db"
    volumes:
      - app-data:/data
    expose:
      - "8080"            # только во внутренней сети, наружу не публикуем

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # APP_DOMAIN берётся из файла .env рядом с compose (его пишет cloud-init).
      # Caddy подставляет его в Caddyfile как {$APP_DOMAIN}.
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data   # хранение сертификатов (важно сохранять между рестартами)
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
