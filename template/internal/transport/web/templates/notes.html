{{define "content"}}
	<form hx-post="/notes" hx-target="#notes" hx-swap="afterbegin" hx-on::after-request="this.reset()">
		<input name="title" placeholder="Заголовок" maxlength="200" required autofocus>
		<textarea name="body" placeholder="Текст заметки (необязательно)" maxlength="10000"></textarea>
		<button type="submit">Добавить</button>
	</form>

	<div id="notes">
		{{range .Notes}}{{template "note" .}}{{else}}<p class="empty" id="empty">Пока нет заметок. Добавьте первую.</p>{{end}}
	</div>
{{end}}
