{{define "layout"}}<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.Title}} · zerovibe</title>

	<!-- Стили приложения. Базовый app.css — здесь; дизайн переносится из макета
	     Pencil (см. skill design): токены в :root, классы под нужный экран. -->
	<link rel="stylesheet" href="/static/app.css">

	<!-- htmx для интерактива (локально, без CDN — важно для работы в РФ). -->
	<script src="/static/htmx.min.js"></script>
	<!-- Слот для дополнительных скриптов экрана, если понадобятся. -->
</head>
<body>
	<main class="container">
		<header class="page-head">
			<h1>Заметки</h1>
			<p class="muted">Эталонное приложение Zerovibe</p>
		</header>
		{{template "content" .}}
	</main>
</body>
</html>{{end}}
