{{define "layout"}}<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.Title}} · zerovibe</title>

	<!-- Franken UI (shadcn-вид на UIkit). Вся статика локальная (/static), без CDN —
	     важно для работы в РФ и доступности. Файлы вшиты в бинарь через embed.
	     Документация компонентов для ИИ-агента: skills/ui-kit/ в плагине. -->
	<link rel="stylesheet" href="/static/frankenui-core.min.css">
	<link rel="stylesheet" href="/static/frankenui-utilities.min.css">

	<!-- Тема Franken UI. Выставляем ДО рендера body, чтобы не было вспышки светлой
	     темы. По умолчанию — тёмная (фирменный вид Zerovibe), тема zinc. Запоминаем
	     выбор пользователя в localStorage под ключом __FRANKEN__. -->
	<script>
		(function () {
			var html = document.documentElement;
			var saved = JSON.parse(localStorage.getItem("__FRANKEN__") || "{}");
			// Zerovibe по умолчанию тёмный; уважаем явный выбор пользователя.
			if (saved.mode === "light") {
				html.classList.remove("dark");
			} else {
				html.classList.add("dark");
			}
			html.classList.add(saved.theme || "uk-theme-zinc");
			html.classList.add(saved.radii || "uk-radii-md");
			html.classList.add(saved.shadows || "uk-shadows-sm");
			html.classList.add(saved.font || "uk-font-sm");
		})();
	</script>

	<script type="module" src="/static/frankenui-core.iife.js"></script>
	<script type="module" src="/static/frankenui-icon.iife.js"></script>
	<script src="/static/htmx.min.js"></script>
</head>
<body class="bg-background text-foreground">
	<div class="uk-container uk-container-small" style="padding-block: 48px;">
		<div class="uk-margin">
			<h1 class="uk-h2">Заметки</h1>
			<p class="uk-text-muted">Эталонное приложение Zerovibe</p>
		</div>
		{{template "content" .}}
	</div>
</body>
</html>{{end}}
